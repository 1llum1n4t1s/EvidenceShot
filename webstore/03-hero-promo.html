<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 800px;
    overflow: hidden;
    font-family: "Segoe UI", "Yu Gothic UI", "Meiryo", sans-serif;
    background:
      radial-gradient(circle at top right, rgba(251, 191, 36, 0.24), transparent 26%),
      radial-gradient(circle at bottom left, rgba(56, 189, 248, 0.22), transparent 30%),
      linear-gradient(135deg, #0f172a 0%, #0f3b5f 42%, #2563eb 100%);
    color: white;
    position: relative;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .orb.a { width: 520px; height: 520px; top: -170px; left: -80px; }
  .orb.b { width: 460px; height: 460px; bottom: -180px; right: -100px; }
  .wrap {
    position: relative;
    z-index: 1;
    width: 1150px;
    height: 100%;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 420px;
    align-items: center;
    gap: 30px;
  }
  .left {
    display: grid;
    gap: 22px;
  }
  .eyebrow {
    font-size: 22px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #fde68a;
    font-weight: 800;
  }
  h1 {
    font-size: 76px;
    line-height: 1.1;
    font-weight: 900;
  }
  .lead {
    font-size: 30px;
    line-height: 1.6;
    color: rgba(255,255,255,0.9);
  }
  .chips {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .chip {
    padding: 14px 20px;
    border-radius: 999px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    font-size: 20px;
    font-weight: 700;
    backdrop-filter: blur(10px);
  }
  .card {
    border-radius: 34px;
    padding: 24px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(14px);
    box-shadow: 0 24px 44px rgba(15, 23, 42, 0.22);
    display: grid;
    gap: 16px;
  }
  .shot {
    height: 210px;
    border-radius: 24px;
    background: linear-gradient(180deg, #f8fafc, #e2e8f0);
    position: relative;
    overflow: hidden;
  }
  .line {
    position: absolute;
    left: 24px;
    right: 24px;
    height: 18px;
    border-radius: 999px;
    background: rgba(148, 163, 184, 0.3);
  }
  .line.l1 { top: 34px; right: 160px; }
  .line.l2 { top: 72px; right: 90px; }
  .line.l3 { top: 110px; right: 130px; }
  .line.l4 { top: 148px; right: 190px; }
  .stamp {
    position: absolute;
    right: 20px;
    bottom: 18px;
    padding: 10px 14px;
    border-radius: 16px;
    background: rgba(15,23,42,0.78);
    color: #fef3c7;
    font-size: 16px;
    font-weight: 800;
  }
  .list {
    display: grid;
    gap: 12px;
    font-size: 19px;
    color: rgba(255,255,255,0.92);
  }
</style>
</head>
<body>
  <div class="orb a"></div>
  <div class="orb b"></div>
  <div class="wrap">
    <section class="left">
      <div class="eyebrow">EvidenceShot 1.0.1</div>
      <h1>証跡を残すための<br>スクリーンショット体験を整理。</h1>
      <div class="lead">
        ポップアップ起点、スクロール連結、タイムスタンプ 13 テーマ、
        そしてサイズ指定まで。テスト用途にも日常利用にも合わせやすくしました。
      </div>
      <div class="chips">
        <div class="chip">表示領域撮影</div>
        <div class="chip">スクロール連結撮影</div>
        <div class="chip">13 テーマ</div>
        <div class="chip">5 サイズ</div>
      </div>
    </section>

    <aside class="card">
      <div class="shot">
        <div class="line l1"></div>
        <div class="line l2"></div>
        <div class="line l3"></div>
        <div class="line l4"></div>
        <div class="stamp">2026/04/23 18:44:07</div>
      </div>
      <div class="list">
        <div>業務向け: 監査プレート / ドキュメント札 / 台帳ライン</div>
        <div>私用向け: フィルム橙 / パステルラベル / ナイトグロー</div>
        <div>Chrome の既定ダウンロード先へ、そのまま保存</div>
      </div>
    </aside>
  </div>
</body>
</html>
