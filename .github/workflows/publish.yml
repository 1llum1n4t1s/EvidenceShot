name: Publish to Chrome Web Store

on:
  push:
    branches:
      - 'release/**'

permissions:
  contents: read

jobs:
  publish:
    name: Chrome Web Store 公開
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: '1'
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: manifest のバージョン取得
        id: version
        run: |
          version=$(grep -oP '(?<="version": ")[^"]+' manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "📦 公開対象バージョン: $version"

      - name: ブランチ名と manifest バージョンを検証
        env:
          BRANCH_VERSION: ${{ github.ref_name }}
          MANIFEST_VERSION: ${{ steps.version.outputs.version }}
        run: |
          expected="release/${MANIFEST_VERSION}"
          if [ "$BRANCH_VERSION" != "$expected" ]; then
            echo "::error::ブランチ名 ($BRANCH_VERSION) と manifest.json のバージョン ($MANIFEST_VERSION) が一致しません。期待値: $expected"
            exit 1
          fi
          echo "✅ ブランチ名と manifest バージョン一致: $expected"

      - name: Node をセットアップ
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存関係をインストール
        # lockfile 整合性を強制するため npm ci のみ。
        run: npm ci

      - name: npm lifecycle 後の公開対象差分を検証
        run: |
          dirty=$(git status --porcelain --untracked-files=all -- manifest.json package.json package-lock.json _locales src)
          if [ -n "$dirty" ]; then
            echo "::error::npm ci 後に公開対象ファイルへ差分が出ました"
            echo "$dirty"
            exit 1
          fi

      - name: package.json と manifest.json のバージョンを検証
        env:
          MANIFEST_VERSION: ${{ steps.version.outputs.version }}
        run: |
          pkg_ver=$(node -p "require('./package.json').version")
          if [ "$pkg_ver" != "$MANIFEST_VERSION" ]; then
            echo "::error::package.json ($pkg_ver) と manifest.json ($MANIFEST_VERSION) が一致しません"
            exit 1
          fi

      - name: アイコンを生成
        run: node scripts/generate-icons.js

      - name: ZIP パッケージを作成
        run: |
          zip -r evidence-shot.zip manifest.json _locales icons src \
            -x "*.DS_Store" "*.swp" "*~"
          ls -lh evidence-shot.zip

      - name: Chrome Web Store にアップロード & 公開
        # chrome-webstore-upload-cli はローカル devDep にインストール済 (package.json で固定)。
        # secrets を持つステップで npm レジストリから未検証コードを取得しない方針のため
        # `npx --no-install` を指定し、node_modules に無ければ失敗させる。
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          npx --no-install chrome-webstore-upload-cli upload \
            --source evidence-shot.zip \
            --extension-id "$CWS_EXTENSION_ID" \
            --client-id "$CWS_CLIENT_ID" \
            --client-secret "$CWS_CLIENT_SECRET" \
            --refresh-token "$CWS_REFRESH_TOKEN" \
            --auto-publish
          echo "🎉 Chrome Web Store への公開リクエストを送信したよ〜"
