<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="popupDocumentTitle">EvidenceShot</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="section-head">
          <h2 data-i18n="popupSectionCaptureNow">今すぐ撮影</h2>
        </div>

        <label class="field">
          <span data-i18n="popupLabelCaptureMode">撮影範囲</span>
          <select id="capture-mode"></select>
        </label>

        <button class="primary capture" id="capture-now" type="button" data-i18n="popupCaptureNowButton">このタブを撮影する</button>
        <p class="status" id="status-text"></p>
        <p class="note" id="shortcut-note" data-i18n="popupNoteShortcutChecking">ショートカットを確認中です。</p>
        <button class="secondary" id="shortcut-setup" type="button" hidden data-i18n="popupShortcutSetupButton">ショートカットを設定する</button>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2 data-i18n="popupSectionSave">保存</h2>
        </div>

        <label class="field">
          <span data-i18n="popupLabelFormat">保存形式</span>
          <select id="format"></select>
        </label>

        <label class="field">
          <span data-i18n="popupLabelFileNamePrefix">ファイル名の先頭</span>
          <input
            id="file-name-prefix"
            type="text"
            maxlength="60"
            data-i18n-placeholder="popupPlaceholderFileNamePrefix"
            placeholder="例: audit-2026（空欄でサイト名を自動）"
          />
        </label>
        <p class="note" data-i18n="popupNoteFileNamePrefix">空欄のときは `screenshot-ドメイン名` が使われます。日時と拡張子は自動で付きます。</p>

        <label class="toggle">
          <span>
            <strong data-i18n="popupLabelCopyToClipboard">クリップボードにもコピー</strong>
            <small data-i18n="popupNoteCopyToClipboard">撮影後、保存とは別に画像を PNG としてクリップボードへ入れます。Excel などへそのまま貼り付けできます。</small>
          </span>
          <input id="copy-to-clipboard" type="checkbox" />
        </label>

        <p class="note" data-i18n="popupNoteDownloadLocation">保存先は Chrome の既定のダウンロードフォルダです。</p>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2 data-i18n="popupSectionOptions">撮影オプション</h2>
        </div>

        <label class="toggle">
          <span>
            <strong data-i18n="popupLabelTimestampEnabled">日付を入れる</strong>
            <small data-i18n="popupNoteTimestampEnabled">右下に昔のフィルムカメラ風の日時を焼き込みます。</small>
          </span>
          <input id="timestamp-enabled" type="checkbox" />
        </label>

        <div class="field-pair">
          <label class="field">
            <span data-i18n="popupLabelTimestampStyle">日付デザイン</span>
            <select id="timestamp-style"></select>
          </label>
          <label class="field">
            <span data-i18n="popupLabelTimestampSize">文字サイズ</span>
            <select id="timestamp-size"></select>
          </label>
        </div>

        <label class="field">
          <span data-i18n="popupLabelFooterText">左下固定テキスト</span>
          <input
            id="footer-text"
            type="text"
            maxlength="80"
            data-i18n-placeholder="popupPlaceholderFooterText"
            placeholder="例: © Example Inc. / 社外秘"
          />
        </label>
        <p class="note" data-i18n="popupNoteFooterLinked">左下の文字は、日付デザインと文字サイズに連動します。</p>

      </section>

    </main>

    <script src="../shared/constants.js"></script>
    <script src="../shared/utils.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
